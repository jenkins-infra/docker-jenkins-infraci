name: Release Drafter
on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
# Only allow 1 release-drafter build at a time to avoid creating multiple "next" releases
concurrency: "release-drafter"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Release Drafter
        uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        with:
          name: next
          tag: next
          version: next
          token: ${{ secrets.GITHUB_TOKEN }}
